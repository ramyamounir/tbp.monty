# @package _global_

defaults:
  - /monty: graph_exp1000_emin_t3_tot2500
  - /monty/motor_system_config: naive_scan_5
  - /monty/learning_module: evidence_1lm_nn10_dod003
  - /monty/sensor_module: camera_dist
  - /monty/connectivity: 1lm_1sm
  - /environment: habitat_dist_agent
  - /env_interface: train_3d_env_interface
  - /env_interface/positioning_procedures_train: getgoodview_viewfinder_patch
  - /env_interface/transform: missing_depthto3d_sensor2_semantic0
  - /logging: silent_info_train
  - /plotter: interactive

experiment:
  _target_: tbp.monty.frameworks.experiments.pretraining_experiments.MontySupervisedObjectPretrainingExperiment
  config:
    max_train_steps: 1000
    max_eval_steps: 500
    max_total_steps: 6000
    n_train_epochs: ${constants.rotations_all_count}
    n_eval_epochs: 3
    model_name_or_path: ""
    min_lms_match: 1
    seed: 42
    supervised_lm_ids: all
    logging:
      run_name: learning_3d
      output_dir: ${path.expanduser:${oc.env:MONTY_MODELS}/3d_sensor}
    environment:
      env_init_args:
        data_path: ${path.expanduser:${oc.env:MONTY_DATA}/habitat/objects/compositional_objects}
